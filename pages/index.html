<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <script>
    (function () {
      var path = location.pathname;
      var basePath;
      if (path.endsWith("/")) {
        basePath = path;
      } else if (/\.[a-z0-9]+$/i.test(path.split("/").pop() || "")) {
        basePath = path.slice(0, path.lastIndexOf("/") + 1);
      } else {
        basePath = path + "/";
      }
      var base = document.createElement("base");
      base.href = basePath;
      document.head.appendChild(base);
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>thesis-trader</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="app-header">
    <h1>thesis-trader</h1>
    <p id="generated-at">公开摘要 · 无敏感持仓</p>
  </header>

  <main id="app">
    <section id="panel-dashboard" class="panel active">
      <div class="card-grid" id="dashboard-cards"></div>
      <div id="dashboard-decisions"></div>
      <div id="dashboard-discipline" class="alert-list"></div>
    </section>

    <section id="panel-review" class="panel">
      <div id="review-list"></div>
      <pre id="review-output" class="review-output hidden"></pre>
    </section>
  </main>

  <div class="flash-note-bar">
    <a id="flash-note-link" class="btn primary flash-btn" href="#" target="_blank" rel="noopener">
      速记观察 / 修改逻辑
    </a>
    <a class="btn flash-btn" href="./mobile.html" style="margin-top:8px;display:block;text-align:center;text-decoration:none;color:#0f172a;background:#4ade80;font-weight:600;">
      本地改持仓（不上传）
    </a>
    <p class="flash-hint">绿色按钮：数据只存本手机，回家导出同步到电脑</p>
  </div>

  <nav class="bottom-nav">
    <button data-tab="dashboard" class="active">摘要</button>
    <button data-tab="review">复盘</button>
  </nav>

  <script src="./app.js"></script>
</body>
</html>
