name: Daily Review

on:
  schedule:
    # 北京时间周一至周五 21:00（UTC 13:00）
    - cron: "0 13 * * 1-5"
  workflow_dispatch:
    inputs:
      market_info:
        description: "今日市场/公司信息（可选，多行）"
        required: false
        type: string

concurrency:
  group: daily-review
  cancel-in-progress: false

jobs:
  review-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily review
        env:
          MARKET_INFO: ${{ github.event.inputs.market_info || secrets.MARKET_INFO || '' }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: python scripts/ci_daily_review.py

      - name: Build GitHub Pages
        run: python scripts/build_pages.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily review $(date -u +%Y-%m-%d)"
            git push
          fi
