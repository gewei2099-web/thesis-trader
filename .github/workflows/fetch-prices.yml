name: Fetch Closing Prices

on:
  schedule:
    # 北京时间周一至周五 15:30
    - cron: "30 7 * * 1-5"
  workflow_dispatch:

concurrency:
  group: fetch-prices
  cancel-in-progress: false

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements.txt

      - run: pip install -r requirements.txt

      - name: Update closing prices
        run: python scripts/fetch_prices.py

      - name: Build public pages
        run: python scripts/build_pages.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/positions.json docs/
          if git diff --staged --quiet; then
            echo "No price changes."
          else
            git commit -m "chore: update closing prices $(date -u +%Y-%m-%d)"
            git push
          fi
